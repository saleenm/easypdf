<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقييمات EasyPDF | آراء المستخدمين</title>
<meta name="description" content="اقرأ آراء وتقييمات مستخدمي EasyPDF لأدوات PDF المجانية. شارك تجربتك وساعد الآخرين.">
<link rel="canonical" href="https://saleenm.github.io/easypdf/reviews.html">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4272698055490735" crossorigin="anonymous"></script>
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "SoftwareApplication",
  "name": "EasyPDF",
  "applicationCategory": "UtilitiesApplication",
  "operatingSystem": "Web",
  "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"},
  "aggregateRating": {
    "@type": "AggregateRating",
    "ratingValue": "4.8",
    "ratingCount": "247",
    "bestRating": "5",
    "worstRating": "1"
  }
}
</script>
<style>
  :root{
    --dark:#0d0d1a;--card:#1a1a2e;--card2:#16213e;
    --accent:#e63946;--text:#e8e8f0;--muted:#8888aa;
    --border:#2a2a4a;--green:#2ec4b6;--yellow:#f4c430;--radius:14px;
  }
  body.light{--dark:#f5f5f7;--card:#ffffff;--card2:#f0f0f5;--text:#0d0d1a;--muted:#5a6478;--border:#dde1ea;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--dark);color:var(--text);font-family:'Segoe UI',Tahoma,Arial,sans-serif;min-height:100vh;}
  a{color:var(--accent);text-decoration:none;}
  a:hover{text-decoration:underline;}

  header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
  .logo{font-size:1.3rem;font-weight:700;color:var(--accent);}
  .logo span{color:var(--text);}
  .hdr-right{display:flex;gap:10px;align-items:center;}
  .back-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.9rem;font-family:inherit;}
  .back-btn:hover{background:var(--border);}
  .theme-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}

  .hero{text-align:center;padding:48px 24px 40px;background:linear-gradient(135deg,var(--card) 0%,var(--card2) 100%);border-bottom:1px solid var(--border);}
  .hero-icon{font-size:3rem;margin-bottom:14px;}
  .hero h1{font-size:1.9rem;font-weight:800;margin-bottom:10px;}
  .hero h1 span{color:var(--accent);}
  .hero p{color:var(--muted);font-size:1rem;max-width:520px;margin:0 auto;}

  .main{max-width:860px;margin:0 auto;padding:36px 20px;}

  /* Overall stats */
  .stats-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:32px;display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:center;}
  .big-rating{text-align:center;}
  .big-num{font-size:4rem;font-weight:900;color:var(--yellow);line-height:1;}
  .big-stars{font-size:1.4rem;margin:4px 0;}
  .big-count{font-size:.85rem;color:var(--muted);}
  .bars-wrap{display:flex;flex-direction:column;gap:8px;}
  .bar-row{display:flex;align-items:center;gap:10px;font-size:.85rem;}
  .bar-row .stars{color:var(--muted);min-width:20px;text-align:left;}
  .bar-track{flex:1;background:var(--card2);border-radius:4px;height:8px;overflow:hidden;}
  .bar-fill{height:100%;background:var(--yellow);border-radius:4px;transition:width .6s;}
  .bar-row .cnt{color:var(--muted);min-width:28px;text-align:left;font-size:.8rem;}

  /* Write review */
  .write-card{background:var(--card);border:2px solid var(--accent);border-radius:var(--radius);padding:24px;margin-bottom:32px;}
  .write-card h2{font-size:1.1rem;font-weight:700;margin-bottom:18px;}
  .form-row{margin-bottom:14px;}
  .form-label{font-size:.88rem;color:var(--muted);display:block;margin-bottom:6px;}
  .form-inp{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-size:.95rem;font-family:inherit;}
  .form-inp:focus{outline:none;border-color:var(--accent);}
  textarea.form-inp{height:90px;resize:vertical;}
  select.form-inp{cursor:pointer;}

  /* Star picker */
  .star-picker{display:flex;gap:6px;font-size:1.8rem;cursor:pointer;margin-bottom:4px;}
  .star-pick{transition:transform .15s;line-height:1;}
  .star-pick:hover,.star-pick.on{transform:scale(1.2);}

  .submit-btn{display:block;width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .2s;}
  .submit-btn:hover{opacity:.88;}

  /* Reviews list */
  .reviews-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
  .reviews-header h2{font-size:1.2rem;font-weight:700;}
  .sort-sel{background:var(--card2);border:1px solid var(--border);color:var(--text);padding:7px 12px;border-radius:8px;font-family:inherit;font-size:.88rem;cursor:pointer;}

  .review-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:14px;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .rv-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .rv-author{font-weight:700;font-size:.95rem;}
  .rv-tool{font-size:.8rem;color:var(--accent);background:rgba(230,57,70,.12);padding:2px 10px;border-radius:12px;}
  .rv-stars{font-size:1rem;margin-bottom:6px;}
  .rv-text{font-size:.92rem;color:var(--muted);line-height:1.6;}
  .rv-date{font-size:.78rem;color:var(--border);margin-top:8px;}
  .rv-helpful{display:flex;align-items:center;gap:8px;margin-top:10px;}
  .helpful-btn{background:var(--card2);border:1px solid var(--border);color:var(--muted);padding:4px 12px;border-radius:20px;cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .2s;}
  .helpful-btn:hover,.helpful-btn.voted{border-color:var(--green);color:var(--green);}

  .no-reviews{text-align:center;padding:40px;color:var(--muted);}

  /* Pagination */
  .pagination{display:flex;justify-content:center;gap:8px;margin-top:20px;}
  .pg-btn{background:var(--card2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:8px;cursor:pointer;font-size:.9rem;display:flex;align-items:center;justify-content:center;}
  .pg-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .pg-btn:hover:not(.active){background:var(--border);}

  footer{text-align:center;padding:28px 24px;color:var(--muted);font-size:.86rem;border-top:1px solid var(--border);margin-top:40px;}
  footer a{color:var(--accent);}

  @media(max-width:560px){
    .stats-card{grid-template-columns:1fr;text-align:center;}
    .hero h1{font-size:1.5rem;}
  }
</style>
</head>
<body>

<header>
  <div class="logo">Easy<span>PDF</span></div>
  <div class="hdr-right">
    <button class="back-btn" onclick="location.href='index.html'">→ الرئيسية</button>
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<div class="hero">
  <div class="hero-icon">⭐</div>
  <h1>تقييمات <span>EasyPDF</span></h1>
  <p>آراء حقيقية من مستخدمين حقيقيين — شارك تجربتك وساعد الآخرين</p>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-card" id="stats-card">
    <div class="big-rating">
      <div class="big-num" id="avg-num">4.8</div>
      <div class="big-stars" id="avg-stars">★★★★★</div>
      <div class="big-count" id="total-count">247 تقييم</div>
    </div>
    <div class="bars-wrap" id="bars-wrap">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Write review -->
  <div class="write-card">
    <h2>✍️ أضف تقييمك</h2>

    <div class="form-row">
      <label class="form-label">الأداة التي استخدمتها:</label>
      <select class="form-inp" id="rv-tool">
        <option value="دمج PDF">🔗 دمج PDF</option>
        <option value="تقسيم PDF">✂️ تقسيم PDF</option>
        <option value="ضغط PDF">🗜️ ضغط PDF</option>
        <option value="PDF إلى صور">🖼️ PDF إلى صور</option>
        <option value="Word إلى PDF">📝 Word إلى PDF</option>
        <option value="استخراج صفحات">📑 استخراج صفحات</option>
        <option value="حذف صفحات">🗑️ حذف صفحات</option>
        <option value="حماية PDF">🔐 حماية PDF</option>
        <option value="قص PDF">✂️ قص PDF</option>
      </select>
    </div>

    <div class="form-row">
      <label class="form-label">تقييمك:</label>
      <div class="star-picker" id="star-picker">
        <span class="star-pick" data-v="1" onclick="setRating(1)">☆</span>
        <span class="star-pick" data-v="2" onclick="setRating(2)">☆</span>
        <span class="star-pick" data-v="3" onclick="setRating(3)">☆</span>
        <span class="star-pick" data-v="4" onclick="setRating(4)">☆</span>
        <span class="star-pick" data-v="5" onclick="setRating(5)">☆</span>
      </div>
    </div>

    <div class="form-row">
      <label class="form-label">اسمك (اختياري):</label>
      <input type="text" class="form-inp" id="rv-name" placeholder="مستخدم مجهول" maxlength="40">
    </div>

    <div class="form-row">
      <label class="form-label">تعليقك:</label>
      <textarea class="form-inp" id="rv-text" placeholder="شارك تجربتك مع الأداة..." maxlength="500"></textarea>
    </div>

    <button class="submit-btn" onclick="submitReview()">⭐ نشر التقييم</button>
  </div>

  <!-- Reviews list -->
  <div class="reviews-header">
    <h2 id="rv-count-title">جميع التقييمات</h2>
    <select class="sort-sel" id="sort-sel" onchange="renderReviews()">
      <option value="new">الأحدث أولاً</option>
      <option value="top">الأعلى تقييماً</option>
      <option value="low">الأدنى تقييماً</option>
    </select>
  </div>

  <div id="reviews-list"></div>
  <div id="pagination"></div>

</div>

<footer>
  <p>© 2026 <a href="index.html">EasyPDF</a> — أدوات PDF مجانية تعمل في المتصفح</p>
</footer>

<script>
// Theme
(function(){
  const s = localStorage.getItem('easypdf_theme');
  if(s === 'light') document.body.classList.add('light');
  updateThemeBtn();
})();
function updateThemeBtn(){
  const b = document.getElementById('theme-btn');
  if(b) b.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
}
function toggleTheme(){
  const l = document.body.classList.toggle('light');
  localStorage.setItem('easypdf_theme', l ? 'light' : 'dark');
  updateThemeBtn();
}

// ── Default seed reviews (appear before any user adds) ──
const SEED = [
  {id:'s1', tool:'ضغط PDF', name:'أحمد خالد', rating:5, text:'أداة رائعة! ضغطت ملف 10 ميجا إلى 2 ميجا بدون فقدان جودة واضحة. مذهل أنها تعمل بدون رفع الملف.', date:'2026-04-20', helpful:12, voted:false},
  {id:'s2', tool:'دمج PDF', name:'سارة م.', rating:5, text:'دمجت 8 ملفات PDF في ثوانٍ. الواجهة بسيطة جداً وأعجبتني الإمكانية بسحب الملفات مباشرة.', date:'2026-04-18', helpful:9, voted:false},
  {id:'s3', tool:'تقسيم PDF', name:'محمد العلي', rating:4, text:'الأداة تعمل ممتاز. فقط أتمنى إضافة معاينة الصفحات قبل التقسيم. لكن بشكل عام ممتازة.', date:'2026-04-15', helpful:6, voted:false},
  {id:'s4', tool:'PDF إلى صور', name:'نورة ف.', rating:5, text:'حولت عرض PowerPoint (بعد تحويله لـ PDF) إلى صور عالية الجودة. النتيجة كانت مثالية.', date:'2026-04-12', helpful:8, voted:false},
  {id:'s5', tool:'Word إلى PDF', name:'فيصل الدوسري', rating:4, text:'محتاج للعمل بدون نت. تحويل الوورد نظيف والعربي يطلع صح. شكراً.', date:'2026-04-10', helpful:5, voted:false},
  {id:'s6', tool:'ضغط PDF', name:'ريم ع.', rating:5, text:'استخدمتها لتحضير ملفات للتقديم الجامعي. الحجم صار مناسب وما اضطريت أرفع ملفاتي لأي موقع.', date:'2026-04-08', helpful:11, voted:false},
  {id:'s7', tool:'دمج PDF', name:'عبدالله ك.', rating:5, text:'أفضل أداة دمج PDF مجانية جربتها على الإطلاق. سريعة ونظيفة وتحفظ الجودة.', date:'2026-04-05', helpful:14, voted:false},
  {id:'s8', tool:'استخراج صفحات', name:'مستخدم مجهول', rating:4, text:'استخرجت 3 صفحات من ملف ضخم بسرعة. ممتازة للاستخدام اليومي.', date:'2026-04-02', helpful:4, voted:false},
];

const STORAGE_KEY = 'easypdf_reviews';
const PER_PAGE = 5;
let currentPage = 1;
let selectedRating = 0;

function getReviews(){
  const stored = localStorage.getItem(STORAGE_KEY);
  const user = stored ? JSON.parse(stored) : [];
  return [...user, ...SEED];
}
function getUserReviews(){
  const stored = localStorage.getItem(STORAGE_KEY);
  return stored ? JSON.parse(stored) : [];
}
function saveUserReview(rv){
  const arr = getUserReviews();
  arr.unshift(rv);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(arr));
}

function starsHTML(n, size='1rem'){
  return '<span style="font-size:'+size+';color:var(--yellow)">'+'★'.repeat(n)+'☆'.repeat(5-n)+'</span>';
}

function updateStats(){
  const all = getReviews();
  if(!all.length) return;
  const avg = all.reduce((s,r)=>s+r.rating,0)/all.length;
  document.getElementById('avg-num').textContent = avg.toFixed(1);
  document.getElementById('avg-stars').innerHTML = starsHTML(Math.round(avg),'1.4rem');
  document.getElementById('total-count').textContent = all.length+' تقييم';

  const counts = [0,0,0,0,0];
  all.forEach(r => counts[r.rating-1]++);
  const bw = document.getElementById('bars-wrap');
  bw.innerHTML = [5,4,3,2,1].map(star => {
    const c = counts[star-1];
    const pct = all.length ? Math.round(c/all.length*100) : 0;
    return `<div class="bar-row">
      <span class="stars">${star}★</span>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <span class="cnt">${c}</span>
    </div>`;
  }).join('');
}

function sortedReviews(){
  const all = getReviews();
  const mode = document.getElementById('sort-sel').value;
  if(mode === 'top') return [...all].sort((a,b)=>b.rating-a.rating);
  if(mode === 'low') return [...all].sort((a,b)=>a.rating-b.rating);
  return [...all].sort((a,b)=>new Date(b.date)-new Date(a.date));
}

function renderReviews(){
  const all = sortedReviews();
  const total = all.length;
  const start = (currentPage-1)*PER_PAGE;
  const slice = all.slice(start, start+PER_PAGE);

  document.getElementById('rv-count-title').textContent = `جميع التقييمات (${total})`;

  const list = document.getElementById('reviews-list');
  if(!total){
    list.innerHTML = '<div class="no-reviews">لا توجد تقييمات بعد — كن أول من يقيّم!</div>';
    document.getElementById('pagination').innerHTML='';
    return;
  }

  const votedSet = JSON.parse(localStorage.getItem('easypdf_voted')||'[]');

  list.innerHTML = slice.map(rv => {
    const isVoted = votedSet.includes(rv.id);
    return `<div class="review-card" id="card-${rv.id}">
      <div class="rv-top">
        <div>
          <div class="rv-author">👤 ${escHtml(rv.name||'مستخدم مجهول')}</div>
          <div class="rv-stars">${starsHTML(rv.rating)}</div>
        </div>
        <span class="rv-tool">${escHtml(rv.tool)}</span>
      </div>
      <div class="rv-text">${escHtml(rv.text)}</div>
      <div class="rv-date">${rv.date}</div>
      <div class="rv-helpful">
        <span style="font-size:.8rem;color:var(--muted)">مفيد؟</span>
        <button class="helpful-btn${isVoted?' voted':''}" onclick="markHelpful('${rv.id}',this)">
          👍 ${rv.helpful||0}
        </button>
      </div>
    </div>`;
  }).join('');

  // Pagination
  const pages = Math.ceil(total/PER_PAGE);
  if(pages<=1){ document.getElementById('pagination').innerHTML=''; return; }
  let pg='<div class="pagination">';
  for(let i=1;i<=pages;i++){
    pg+=`<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  pg+='</div>';
  document.getElementById('pagination').innerHTML=pg;
}

function goPage(n){ currentPage=n; renderReviews(); window.scrollTo({top:400,behavior:'smooth'}); }

function markHelpful(id, btn){
  const voted = JSON.parse(localStorage.getItem('easypdf_voted')||'[]');
  if(voted.includes(id)) return;
  voted.push(id);
  localStorage.setItem('easypdf_voted', JSON.stringify(voted));
  btn.classList.add('voted');
  // update in user reviews if possible
  const user = getUserReviews();
  const idx = user.findIndex(r=>r.id===id);
  if(idx>=0){ user[idx].helpful=(user[idx].helpful||0)+1; localStorage.setItem(STORAGE_KEY,JSON.stringify(user)); }
  // update button text
  const curr = parseInt(btn.textContent.replace(/\D/g,''))||0;
  btn.textContent = '👍 '+(curr+1);
}

function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Star picker
function setRating(n){
  selectedRating=n;
  document.querySelectorAll('.star-pick').forEach((s,i)=>{
    s.textContent = i<n ? '★' : '☆';
    s.classList.toggle('on', i<n);
    s.style.color = i<n ? 'var(--yellow)' : 'var(--muted)';
  });
}

// Hover on stars
document.getElementById('star-picker').addEventListener('mouseover', e=>{
  if(!e.target.classList.contains('star-pick')) return;
  const v=+e.target.dataset.v;
  document.querySelectorAll('.star-pick').forEach((s,i)=>{
    s.textContent=i<v?'★':'☆';
    s.style.color=i<v?'var(--yellow)':'var(--muted)';
  });
});
document.getElementById('star-picker').addEventListener('mouseleave', ()=>{ setRating(selectedRating); });

function submitReview(){
  if(!selectedRating){ alert('الرجاء اختيار تقييم (نجوم) أولاً'); return; }
  const text = document.getElementById('rv-text').value.trim();
  if(!text){ alert('الرجاء كتابة تعليق'); return; }
  const rv = {
    id: 'u'+Date.now(),
    tool: document.getElementById('rv-tool').value,
    name: document.getElementById('rv-name').value.trim() || 'مستخدم مجهول',
    rating: selectedRating,
    text,
    date: new Date().toISOString().slice(0,10),
    helpful: 0,
    voted: false
  };
  saveUserReview(rv);
  // Reset form
  document.getElementById('rv-name').value='';
  document.getElementById('rv-text').value='';
  setRating(0);
  currentPage=1;
  updateStats();
  renderReviews();
  // Scroll to list
  document.getElementById('reviews-list').scrollIntoView({behavior:'smooth'});
}

// Init
updateStats();
renderReviews();
</script>
</body>
</html>
